<script src="data.js"></script>
<script>
    // Parse URL parameters
    const urlParams = new URLSearchParams(window.location.search);
    const subjectId = urlParams.get('subject') || 'ict';
    const chapterId = urlParams.get('chapter') || '1';

    // Load data from testDatabase
    let dbData = null;
    let shortCQData = [];
    let fullCQData = [];
    
    if (typeof testDatabase !== 'undefined' && testDatabase[subjectId] && testDatabase[subjectId][chapterId]) {
        dbData = testDatabase[subjectId][chapterId];
        
        // Normalize Full CQ Data
        const rawFullData = dbData.fullCQData || [];
        fullCQData = rawFullData.map(q => {
            // Check for new schema
            if (q.full_cq && !q.questions) {
                return {
                    id: q.question_id || q.id,
                    stem: q.stem,
                    meta: q.chapter || dbData.chapterName,
                    type: q.type || "board",
                    stemImage: (q.images && q.images.find(img => img.src)?.src) || "",
                    // We'll map the pre-rendered HTML to a compatible structure
                    questions: q.full_cq.map((html, i) => {
                        const label = String.fromCharCode(97 + i);
                        return {
                            label: label,
                            text: `See Question and Answer for Part (${label})`, // Button text
                            answer: "PRE_RENDERED", // Marker for renderer
                            preRenderedHtml: html
                        };
                    }),
                    isNewSchema: true
                };
            }
            return q;
        });

        shortCQData = dbData.shortCQData || [];
        
        // Dynamic Fallback: Include Knowledge & Comprehension parts if shortCQData is empty
        if (shortCQData.length === 0 && fullCQData.length > 0) {
            fullCQData.forEach(q => {
                if (q.isNewSchema && q.knowledge_comprehension) {
                    q.knowledge_comprehension.forEach((html, i) => {
                        const label = String.fromCharCode(97 + i);
                        shortCQData.push({
                            id: q.id + "-" + label,
                            category: label === 'a' ? "Knowledge" : "Comprehension",
                            text: `See Question and Answer for Part (${label})`,
                            answer: "PRE_RENDERED",
                            preRenderedHtml: html,
                            meta: q.meta,
                            type: q.type
                        });
                    });
                } else if (q.questions) {
                    const qA = q.questions.find(sq => sq.label === 'a');
                    if (qA) {
                        shortCQData.push({
                            id: q.id + "-a",
                            category: "Knowledge",
                            text: qA.text,
                            answer: qA.answer,
                            meta: q.meta,
                            type: q.type
                        });
                    }
                    const qB = q.questions.find(sq => sq.label === 'b');
                    if (qB) {
                        shortCQData.push({
                            id: q.id + "-b",
                            category: "Comprehension",
                            text: qB.text,
                            answer: qB.answer,
                            meta: q.meta,
                            type: q.type
                        });
                    }
                }
            });
        }
        
        // Update breadcrumbs
        document.getElementById('bc-subject').innerText = dbData.subjectName || "Subject";
        document.getElementById('bc-chapter').innerText = dbData.chapterName || "Chapter";
    } else {
        document.getElementById('bc-subject').innerText = "Unknown Subject";
        document.getElementById('bc-chapter').innerText = "Unknown Chapter";
    }

    let currentTab = 'short'; // 'short' or 'full'
    const cqListContainer = document.getElementById('cqListContainer');
    let currentFilter = 'all'; // can be 'all', 'college', 'board'
    let currentYear = 'all';
    let currentTopic = 'all';
    
    // Track expanded state of answers
    const expandedState = {};
    let isGlobalShowAns = false;

    const globalToggle = document.getElementById('globalShowAnsToggle');
    const globalThumb = document.getElementById('globalShowAnsThumb');
    globalToggle.addEventListener('click', () => {
        isGlobalShowAns = !isGlobalShowAns;
        if (isGlobalShowAns) {
            globalToggle.classList.replace('bg-gray-400', 'bg-sky-500');
            globalThumb.classList.replace('translate-x-0', 'translate-x-6');
            
            // Expand all
            if (currentTab === 'short') {
                shortCQData.forEach(q => expandedState[q.id] = true);
            } else {
                fullCQData.forEach(q => {
                    q.questions.forEach(subQ => expandedState[`${q.id}-${subQ.label}`] = true);
                });
            }
        } else {
            globalToggle.classList.replace('bg-sky-500', 'bg-gray-400');
            globalThumb.classList.replace('translate-x-6', 'translate-x-0');
            
            // Collapse all
            for (let key in expandedState) expandedState[key] = false;
        }
        renderContent();
        if (window.MathJax) {
            MathJax.typesetPromise();
        }
    });

    function toggleAnswer(id) {
        expandedState[id] = !expandedState[id];
        renderContent();
        if (window.MathJax) {
            MathJax.typesetPromise();
        }
    }

    function switchTab(tab) {
        currentTab = tab;
        
        const tabShort = document.getElementById('tabShort');
        const tabFull = document.getElementById('tabFull');
        const indicator = document.getElementById('tabIndicator');

        if (tab === 'short') {
            tabShort.classList.replace('text-gray-600', 'text-white');
            tabShort.classList.replace('dark:text-gray-400', 'text-white');
            
            tabFull.classList.replace('text-white', 'text-gray-600');
            tabFull.classList.add('dark:text-gray-400');
            
            indicator.style.transform = 'translateX(0%)';
        } else {
            tabFull.classList.replace('text-gray-600', 'text-white');
            tabFull.classList.replace('dark:text-gray-400', 'text-white');
            
            tabShort.classList.replace('text-white', 'text-gray-600');
            tabShort.classList.add('dark:text-gray-400');
            
            indicator.style.transform = 'translateX(100%)';
        }
        
        // Reset expanded state on tab switch
        for (let key in expandedState) expandedState[key] = false;
        
        renderContent();
    }

    function processContent(text) {
        if (!text || text === "PRE_RENDERED") return "";
        
        // Return as-is if it's already structured HTML (starts with <)
        const trimmed = text.trim();
        if (trimmed.startsWith('<') && trimmed.endsWith('>')) {
            return text;
        }
        
        let processed = text;
        
        // Handle *table notation
        if (processed.includes('*table')) {
            const sections = processed.split('*table');
            let finalHtml = sections[0];
            
            for (let i = 1; i < sections.length; i++) {
                const section = sections[i];
                const lines = section.split('\n');
                let tableLines = [];
                let afterTable = [];
                let inTable = true;
                
                for (let j = 0; j < lines.length; j++) {
                    const line = lines[j];
                    if (inTable && (line.includes('|') || line.trim() === '')) {
                        if (line.includes('|')) tableLines.push(line);
                    } else {
                        inTable = false;
                        afterTable.push(line);
                    }
                }
                
                if (tableLines.length > 0) {
                    let tableHtml = '<div class="table-responsive my-6 shadow-sm border border-gray-100 dark:border-gray-800 rounded-xl">';
                    tableHtml += '<table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">';
                    
                    let rowCount = 0;
                    tableLines.forEach(line => {
                        if (line.includes(':---')) return;
                        
                        const cells = line.split('|').filter((c, idx, arr) => {
                            if (idx === 0 && c.trim() === '') return false;
                            if (idx === arr.length - 1 && c.trim() === '') return false;
                            return true;
                        });
                        
                        if (cells.length === 0) return;
                        
                        const bgClass = rowCount === 0 ? 'bg-gray-50 dark:bg-gray-800' : 'bg-white dark:bg-gray-900';
                        tableHtml += `<tr class="${bgClass}">`;
                        
                        cells.forEach(cell => {
                            const trimmed = cell.trim();
                            const tag = rowCount === 0 ? 'th' : 'td';
                            const isNumeric = /\d/.test(trimmed) && !/[a-zA-Z]{3,}/.test(trimmed.replace('TK', ''));
                            const align = isNumeric ? 'text-right' : 'text-left';
                            const textClass = rowCount === 0 ? 'text-[11px] font-bold uppercase tracking-wider text-gray-500 dark:text-gray-400' : 'text-[13px] text-gray-700 dark:text-gray-300';
                            
                            // Support bold in cells
                            let cellContent = trimmed.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                            
                            tableHtml += `<${tag} class="px-4 py-2.5 ${align} ${textClass} border-r border-gray-200 dark:border-gray-700 last:border-r-0">${cellContent}</${tag}>`;
                        });
                        
                        tableHtml += '</tr>';
                        rowCount++;
                    });
                    
                    tableHtml += '</table></div>';
                    finalHtml += tableHtml + afterTable.join('\n');
                } else {
                    finalHtml += '*table' + section;
                }
            }
            processed = finalHtml;
        }

        // Handle line breaks and basic formatting outside tables
        processed = processed.replace(/\n/g, '<br>');
        processed = processed.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        processed = processed.replace(/\*(.*?)\*/g, '<em>$1</em>');
        
        return processed;
    }

    function renderContent() {
        if (currentTab === 'short') {
            renderShortCQ();
        } else {
            renderFullCQ();
        }
        filterQuestions();
    }

    function renderShortCQ() {
        let html = '';
        shortCQData.forEach((q, index) => {
            const isExpanded = expandedState[q.id];
            
            let filterType = 'college';
            if (q.type === 'board') {
                filterType = 'board';
            } else if (q.type === 'college') {
                filterType = 'college';
            } else {
                const metaLower = q.meta ? q.meta.toLowerCase() : '';
                const boardKeywords = ['board', 'বোর্ড', 'dhaka', 'rajshahi', 'comilla', 'chittagong', 'sylhet', 'barisal', 'jessore', 'dinajpur', 'mymensingh', 'madrasa', 'technical'];
                const isBoard = metaLower && boardKeywords.some(kw => metaLower.includes(kw));
                filterType = isBoard ? 'board' : 'college';

            html += `
            <div id="short-cq-item-${index}" data-filter="${filterType}" class="w-full min-w-0">

                        <span class="shrink-0 w-7 h-7 rounded-full border-2 flex items-center justify-center text-[11px] font-bold poppins transition-all duration-200 ${isExpanded ? 'bg-emerald-500 text-white border-emerald-500' : 'bg-gray-50 dark:bg-gray-900 text-gray-500 dark:text-gray-400 border-gray-300 dark:border-gray-600'}">
                            ${q.id}
                        </span>
                        <div class="flex-1 min-w-0 pt-0.5">
                            <div class="flex items-center gap-2 mb-1.5">
                                <span class="px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider ${q.category === 'Knowledge' ? 'bg-amber-100 text-amber-700 dark:bg-amber-900/30 dark:text-amber-400' : 'bg-purple-100 text-purple-700 dark:bg-purple-900/30 dark:text-purple-400'}">
                                    ${q.category || 'Knowledge'}
                                </span>
                            </div>
                            <span class="block">
                                <span class="text-[15px] font-medium ${isExpanded ? 'text-emerald-900 dark:text-emerald-400' : 'text-gray-800 dark:text-gray-200'} leading-relaxed inline">
                                    ${processContent(q.text || q.question)}
                                </span>
                                <span class="poppins text-[11px] text-gray-400 dark:text-gray-500 block mt-2">
                                    [${q.meta || dbData.subjectName}]
                                </span>
                            </span>
                        </div>
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 shrink-0 transition-transform duration-300 ${isExpanded ? 'rotate-180 text-emerald-500' : 'text-gray-400 dark:text-gray-500'}">
                            <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5"></path>
                        </svg>
                    </button>
                    
                    <!-- Answer Section -->
                    <div class="overflow-hidden transition-all duration-300 ease-in-out ${isExpanded ? 'max-h-[5000px] opacity-100' : 'max-h-0 opacity-0'}">
                        <div class="p-4 bg-emerald-50/80 dark:bg-emerald-900/20 border-t border-emerald-100 dark:border-emerald-800/50 rounded-b-xl mx-2 mb-2">
                            <div class="flex items-start gap-2.5">
                                <div class="shrink-0 mt-0.5 w-5 h-5 rounded-full bg-emerald-100 dark:bg-emerald-800/50 flex items-center justify-center">
                                    <svg class="w-3 h-3 text-emerald-600 dark:text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                                </div>
                                <div class="flex-1 min-w-0">
                                    ${(() => {
                                        const displayContent = q.preRenderedHtml || processContent(q.answer);
                                        return displayContent ? `
                                            <h4 class="text-xs font-bold text-emerald-800 dark:text-emerald-400 mb-1 uppercase tracking-wider poppins">${q.preRenderedHtml ? 'Question & Answer' : 'Answer'}</h4>
                                            <div class="text-sm text-emerald-900 dark:text-emerald-200/90 leading-relaxed">${displayContent}</div>
                                        ` : "";
                                    })()}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            `;
        });
        cqListContainer.innerHTML = html;
    }

    function renderFullCQ() {
        let html = '';
        fullCQData.forEach((q, index) => {
            let filterType = 'college';
            if (q.type === 'board') {
                filterType = 'board';
            } else if (q.type === 'college') {
                filterType = 'college';
            } else {
                const metaLower = q.meta ? q.meta.toLowerCase() : '';
                const boardKeywords = ['board', 'বোর্ড', 'dhaka', 'rajshahi', 'comilla', 'chittagong', 'sylhet', 'barisal', 'jessore', 'dinajpur', 'mymensingh', 'madrasa', 'technical'];
                const isBoard = metaLower && boardKeywords.some(kw => metaLower.includes(kw));
                filterType = isBoard ? 'board' : 'college';
            }
            
            const questionsHtml = q.questions.map((subQ) => {
                const subId = `${q.id}-${subQ.label}`;
                const isExpanded = expandedState[subId];
                
                return `
                <div class="mt-3 border transition-all duration-300 rounded-xl ${isExpanded ? 'border-emerald-200 dark:border-emerald-800/50 bg-emerald-50/30 dark:bg-emerald-900/10' : 'border-gray-100 dark:border-gray-800/60 bg-gray-50/50 dark:bg-gray-800/30'}">
                    <button type="button" onclick="toggleAnswer('${subId}')" class="w-full flex items-start gap-3 px-4 py-3.5 text-left focus:outline-none hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors rounded-xl">
                        <span class="shrink-0 w-6 h-6 rounded-full border flex items-center justify-center text-[11px] font-bold poppins transition-all duration-200 ${isExpanded ? 'bg-emerald-500 text-white border-emerald-500' : 'bg-white dark:bg-gray-900 text-gray-500 dark:text-gray-400 border-gray-300 dark:border-gray-600'}">
                            ${subQ.label}
                        </span>
                        <div class="flex-1 min-w-0 pt-0.5">
                            <span class="text-[14px] font-medium ${isExpanded ? 'text-emerald-900 dark:text-emerald-400' : 'text-gray-700 dark:text-gray-300'} leading-relaxed">
                                ${processContent(subQ.text)}
                            </span>
                        </div>
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4 mt-0.5 shrink-0 transition-transform duration-300 ${isExpanded ? 'rotate-180 text-emerald-500' : 'text-gray-400 dark:text-gray-500'}">
                            <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5"></path>
                        </svg>
                    </button>
                    
                    <div class="overflow-hidden transition-all duration-300 ease-in-out ${isExpanded ? 'max-h-[5000px] opacity-100' : 'max-h-0 opacity-0'}">
                        <div class="p-4 bg-emerald-50/80 dark:bg-emerald-900/20 border-t border-emerald-100 dark:border-emerald-800/50 rounded-b-xl mx-2 mb-2">
                            <div class="flex items-start gap-2.5">
                                <div class="shrink-0 mt-0.5 w-5 h-5 rounded-full bg-emerald-100 dark:bg-emerald-800/50 flex items-center justify-center">
                                    <svg class="w-3 h-3 text-emerald-600 dark:text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                                </div>
                                <div class="flex-1 min-w-0">
                                    <h4 class="text-xs font-bold text-emerald-800 dark:text-emerald-400 mb-1 uppercase tracking-wider poppins">${subQ.preRenderedHtml ? 'Question & Answer' : 'Answer'}</h4>
                                    <div class="text-sm text-emerald-900 dark:text-emerald-200/90 leading-relaxed ${subQ.preRenderedHtml ? '' : 'whitespace-pre-wrap'}">${subQ.preRenderedHtml || processContent(subQ.answer)}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                `;
            }).join('');

            html += `
            <div id="full-cq-item-${index}" data-filter="${filterType}" class="w-full mb-6 min-w-0">
                <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 shadow-sm overflow-hidden">
                    
                    <!-- Header / Stem -->
                    <div class="p-5 border-b border-gray-100 dark:border-gray-800">
                        <div class="flex items-center gap-3 mb-4">
                            <span class="shrink-0 px-3 py-1 rounded-md bg-sky-100 dark:bg-sky-900/30 text-sky-600 dark:text-sky-400 text-xs font-bold poppins">Question ${q.id}</span>
                            <div class="h-px flex-1 bg-gray-100 dark:bg-gray-800"></div>
                        </div>
                        <div class="text-[15px] text-gray-800 dark:text-gray-200 leading-relaxed bg-sky-50/50 dark:bg-sky-900/10 p-4 rounded-xl border-l-4 border-sky-400 italic">
                            ${processContent(q.stem)}
                            ${q.stemImage && q.stemImage.trim() !== '' ? `
                            <div class="mt-4 flex justify-center">
                                <img src="${q.stemImage}" class="rounded-lg shadow-sm max-w-full h-auto border border-gray-200 dark:border-gray-700" onerror="this.style.display='none'">
                            </div>
                            ` : ''}
                        </div>
                        <p class="poppins text-[11px] font-medium text-gray-400 dark:text-gray-500 mt-4">
                            [${q.meta}]
                        </p>
                    </div>

                    <!-- Sub Questions -->
                    <div class="p-4 sm:p-5">
                        <h3 class="text-sm font-semibold text-gray-900 dark:text-white mb-2">Answer the following questions:</h3>
                        ${questionsHtml}
                    </div>
                    
                </div>
            </div>
            `;
        });
        cqListContainer.innerHTML = html;
    }

    const topicKeywords = {
        "Journal (জাবেদা)": ["journal", "জাবেদা"],
        "Ledger (খতিয়ান)": ["ledger", "খতিয়ান", "টি-ছক", "চলমান জের"],
        "Cash Book (নগদান বই)": ["cash book", "নগদান বই", "দুঘরা", "তিনঘরা"],
        "Trial Balance (রেওয়ামিল)": ["trial balance", "রেওয়ামিল"],
        "Straight Line Method (সরলরৈখিক)": ["straight line", "সরলরৈখিক", "স্থির কিস্তি"],
        "Diminishing Balance (ক্রমহ্রাসমান)": ["diminishing balance", "ক্রমহ্রাসমান", "দ্বৈত"],
        "Asset Disposal (বিক্রয়/নিষ্পত্তি)": ["disposal", "বিক্রয়", "লাভ-ক্ষতি", "অবচয় সঞ্চিতি"],
        "Bank Reconciliation (ব্যাংক সমন্বয়)": ["bank reconciliation", "ব্যাংক বিবরণী", "ব্যাংক সমন্বয়"],
        "Financial Statement (আর্থিক বিবরণী)": ["financial statement", "আর্থিক অবস্থার বিবরণী", "বিষদ আয় বিবরণী", "সম্পদ", "দায়"],
        "Adjusting Entry (সমন্বয় দাখিলা)": ["adjusting", "সমন্বয় দাখিলা", "বকেয়া", "অগ্রিম"],
        "Rectification (ভুল সংশোধন)": ["rectification", "ভুল সংশোধন"],
        "Depreciation (অবচয়)": ["depreciation", "অবচয়"],
        "Inventory (মজুদ পণ্য)": ["inventory", "মজুদ", "পণ্য"],
        "Accounts Receivable (প্রাপ্য হিসাব)": ["receivable", "প্রাপ্য হিসাব", "অনাদায়ী পাওনা"],
    };

    function discoverTopics() {
        const foundTopics = new Set();
        
        // Scan Short CQ
        shortCQData.forEach(q => {
            const content = (q.text + " " + (q.meta || "")).toLowerCase();
            for (const [topic, keywords] of Object.entries(topicKeywords)) {
                if (keywords.some(kw => content.includes(kw.toLowerCase()))) {
                    foundTopics.add(topic);
                }
            }
        });

        // Scan Full CQ
        fullCQData.forEach(q => {
            let content = (q.stem + " " + (q.meta || "")).toLowerCase();
            if (q.questions) {
                q.questions.forEach(sq => content += " " + sq.text.toLowerCase());
            }
            for (const [topic, keywords] of Object.entries(topicKeywords)) {
                if (keywords.some(kw => content.includes(kw.toLowerCase()))) {
                    foundTopics.add(topic);
                }
            }
        });

        return Array.from(foundTopics).sort();
    }

    function updateFilters() {
        const yearSet = new Set();
        
        // Collect years from both datasets
        [...shortCQData, ...fullCQData].forEach(q => {
            const yearMatch = (q.meta || "").match(/\d{4}/);
            if (yearMatch) yearSet.add(yearMatch[0]);
        });

        const yearFilter = document.getElementById('yearFilter');
        const topicFilter = document.getElementById('topicFilter');

        // Populate Years
        const sortedYears = Array.from(yearSet).sort((a, b) => b - a);
        let yearHtml = '<option value="all">All Years</option>';
        sortedYears.forEach(year => {
            yearHtml += `<option value="${year}">${year}</option>`;
        });
        yearFilter.innerHTML = yearHtml;

        // Discover and Populate Topics
        const discoveredTopics = discoverTopics();
        let topicHtml = '<option value="all">All Topics</option>';
        discoveredTopics.forEach(topic => {
            topicHtml += `<option value="${topic}">${topic}</option>`;
        });
        topicFilter.innerHTML = topicHtml;
    }

    function filterQuestions() {
        const prefix = currentTab === 'short' ? 'short-cq-item-' : 'full-cq-item-';
        const data = currentTab === 'short' ? shortCQData : fullCQData;
        
        let visibleCount = 0;
        data.forEach((q, index) => {
            const el = document.getElementById(`${prefix}${index}`);
            if (!el) return;
            
            const filterType = el.getAttribute('data-filter');
            const meta = q.meta || "";
            const yearMatch = meta.match(/\d{4}/);
            const qYear = yearMatch ? yearMatch[0] : null;

            let show = true;

            // Type Filter
            if (currentFilter !== 'all' && filterType !== currentFilter) show = false;
            
            // Year Filter
            if (currentYear !== 'all' && qYear !== currentYear) show = false;
            
            // Topic Filter
            if (currentTopic !== 'all') {
                const keywords = topicKeywords[currentTopic];
                let content = ( (q.text || q.stem || "") + " " + (q.meta || "")).toLowerCase();
                if (q.questions) {
                    q.questions.forEach(sq => content += " " + sq.text.toLowerCase());
                }
                
                if (!keywords || !keywords.some(kw => content.includes(kw.toLowerCase()))) {
                    show = false;
                }
            }

            if (show) {
                visibleCount++;
                el.style.display = 'block';
                // Update the visible number badge
                const badge = el.querySelector('.poppins.font-bold');
                if (badge) badge.innerText = visibleCount;
            } else {
                el.style.display = 'none';
            }
        });
    }

    // Filter Logic
    const filterAllBtn = document.getElementById('filterAllBtn');
    const filterCollegeBtn = document.getElementById('filterCollegeBtn');
    const filterBoardBtn = document.getElementById('filterBoardBtn');
    
    function updateFilterUI(activeBtn) {
        if (!filterAllBtn) return;
        [filterAllBtn, filterCollegeBtn, filterBoardBtn].forEach(btn => {
            if(btn === activeBtn) {
                btn.className = "px-4 py-1.5 rounded-full text-sm font-medium bg-white dark:bg-slate-600 text-gray-900 dark:text-white shadow-sm transition-colors";
            } else {
                btn.className = "px-4 py-1.5 rounded-full text-sm font-medium text-gray-500 hover:text-gray-700 dark:hover:text-gray-200 transition-colors";
            }
        });
    }

    if (filterAllBtn) {
        filterAllBtn.addEventListener('click', () => {
            currentFilter = 'all';
            updateFilterUI(filterAllBtn);
            filterQuestions();
        });

        filterCollegeBtn.addEventListener('click', () => {
            currentFilter = 'college';
            updateFilterUI(filterCollegeBtn);
            filterQuestions();
        });

        filterBoardBtn.addEventListener('click', () => {
            currentFilter = 'board';
            updateFilterUI(filterBoardBtn);
            filterQuestions();
        });
    }

    // Dropdown Listeners
    document.getElementById('yearFilter').addEventListener('change', (e) => {
        currentYear = e.target.value;
        filterQuestions();
    });

    document.getElementById('topicFilter').addEventListener('change', (e) => {
        currentTopic = e.target.value;
        filterQuestions();
    });

    // Dark mode toggle
    const themeToggleBtn = document.getElementById('themeToggleBtn');
    themeToggleBtn.addEventListener('click', () => {
        document.documentElement.classList.toggle('dark');
        const thumb = document.getElementById('themeToggleThumb');
        if (document.documentElement.classList.contains('dark')) {
            thumb.innerHTML = '<span class="text-xs">🌙</span>';
        } else {
            thumb.innerHTML = '<span class="text-xs">☀️</span>';
        }
    });

    // Initial render
    updateFilters();
    renderContent();
    if (window.MathJax) {
        MathJax.typesetPromise();
    }
</script>

<script src="global.js"></script>
</body>
</html>
