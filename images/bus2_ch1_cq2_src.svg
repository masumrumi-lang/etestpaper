<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111111"/>
    </marker>
    <style>
      .label { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight: 700; fill: #111111; text-anchor: middle; dominant-baseline: middle; }
      .title-text { font-size: 24px; }
      .variable-text { font-size: 32px; font-style: italic; fill: #d32f2f; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="none"/>

  <g transform="translate(400, 400)">
    <path d="M 40,-310 A 312,312 0 0,1 270,-155" fill="none" stroke="#111111" stroke-width="5" marker-end="url(#arrow)"/>
    <path d="M 290,-115 A 312,312 0 0,1 210,230" fill="none" stroke="#111111" stroke-width="5" marker-end="url(#arrow)"/>
    <path d="M 170,260 A 312,312 0 0,1 -170,260" fill="none" stroke="#111111" stroke-width="5" marker-end="url(#arrow)"/>
    <path d="M -210,230 A 312,312 0 0,1 -270,-155" fill="none" stroke="#111111" stroke-width="5" marker-end="url(#arrow)"/>
    <path d="M -260,-170 A 312,312 0 0,1 -40,-310" fill="none" stroke="#111111" stroke-width="5" marker-end="url(#arrow)"/>

    <circle r="270" fill="#ffffff" stroke="#111111" stroke-width="4"/>
    <circle r="45" fill="#ffffff" stroke="#111111" stroke-width="4"/>

    <line x1="0" y1="0" x2="263.2" y2="-58.5" stroke="#111111" stroke-width="3"/>
    <line x1="0" y1="0" x2="211.1" y2="168.3" stroke="#111111" stroke-width="3"/>
    <line x1="0" y1="0" x2="0" y2="270" stroke="#111111" stroke-width="3"/>
    <line x1="0" y1="0" x2="-168.3" y2="211.1" stroke="#111111" stroke-width="3"/>
    <line x1="0" y1="0" x2="-263.2" y2="58.5" stroke="#111111" stroke-width="3"/>
    <line x1="0" y1="0" x2="-117.1" y2="-243.3" stroke="#111111" stroke-width="3"/>
    <line x1="0" y1="0" x2="117.1" y2="-243.3" stroke="#111111" stroke-width="3"/>

    <text x="145" y="-120" class="label title-text" transform="rotate(15, 145, -120)">Planning</text>

    <text x="160" y="55" class="label variable-text" transform="rotate(15, 160, 55)">A</text>

    <text x="95" y="180" class="label title-text" transform="rotate(65, 95, 180)">Staffing</text>

    <text x="-95" y="180" class="label title-text" transform="rotate(-65, -95, 180)">Directing</text>

    <text x="-165" y="55" class="label title-text" transform="rotate(-15, -165, 55)">Motivating</text>

    <text x="-145" y="-120" class="label title-text" transform="rotate(-15, -145, -120)">Coordinating</text>

    <text x="0" y="-165" class="label variable-text">B</text>
  </g>
</svg>
