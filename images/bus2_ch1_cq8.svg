<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <style>
      .main-text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight: 700; fill: #111111; text-anchor: middle; dominant-baseline: middle; }
      .label-title { font-size: 24px; letter-spacing: 0.5px; }
      .variable-style { font-size: 42px; font-style: italic; fill: #d32f2f; font-weight: bold; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="#ffffff"/>

  <g transform="translate(400, 400)">
    <circle r="320" fill="none" stroke="#111111" stroke-width="4"/>

    <line x1="0" y1="-320" x2="0" y2="320" stroke="#111111" stroke-width="3"/>
    <line x1="-320" y1="0" x2="320" y2="0" stroke="#111111" stroke-width="3"/>
    <line x1="-226.3" y1="-226.3" x2="226.3" y2="226.3" stroke="#111111" stroke-width="3"/>
    <line x1="-226.3" y1="226.3" x2="226.3" y2="-226.3" stroke="#111111" stroke-width="3"/>

    <text x="100" y="-150" class="main-text variable-style">A</text>

    <text x="190" y="-60" class="main-text label-title">ORGANIZING</text>

    <text x="160" y="80" class="main-text label-title">STAFFING</text>

    <text x="-110" y="170" class="main-text label-title">DIRECTING</text>

    <text x="-190" y="60" class="main-text label-title">MOTIVATING</text>

    <text x="-190" y="-80" class="main-text variable-style">F</text>

    <text x="-110" y="-180" class="main-text label-title">CONTROLLING</text>
  </g>
</svg>
