<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="100%" height="100%">
  <defs>
    <style>
      .pyramid-line { stroke: #111111; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .text-style { font-family: 'Times New Roman', Times, serif; font-size: 38px; font-weight: bold; fill: #111111; text-anchor: middle; dominant-baseline: central; }
      .circle-marker { fill: none; stroke: #111111; stroke-width: 3; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="#ffffff"/>

  <g>
    <polygon points="300,40 80,460 520,460" fill="none" stroke="#111111" stroke-width="4" stroke-linejoin="round"/>
    
    <line x1="214" y1="180" x2="386" y2="180" class="pyramid-line"/>
    
    <line x1="143" y1="315" x2="457" y2="315" class="pyramid-line"/>
  </g>

  <g>
    <circle cx="300" cy="115" r="26" class="circle-marker"/>
    <text x="300" y="117" class="text-style">A</text>

    <circle cx="300" cy="248" r="26" class="circle-marker"/>
    <text x="300" y="250" class="text-style">B</text>

    <circle cx="300" cy="388" r="26" class="circle-marker"/>
    <text x="300" y="390" class="text-style">C</text>
  </g>
</svg>
