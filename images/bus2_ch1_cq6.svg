<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <style>
      .main-text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight: 700; fill: #111111; text-anchor: middle; dominant-baseline: middle; }
      .label-title { font-size: 22px; }
      .label-num { font-size: 28px; font-weight: bold; fill: #111111; }
      .variable-style { font-size: 36px; font-style: italic; fill: #d32f2f; }
      .center-title { font-size: 22px; font-weight: bold; fill: #111111; text-anchor: middle; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="#ffffff"/>

  <g transform="translate(400, 400)">
    <circle r="290" fill="#ffffff" stroke="#111111" stroke-width="4"/>
    <circle r="95" fill="#ffffff" stroke="#111111" stroke-width="4"/>

    <text x="0" y="-12" class="main-text center-title" font-size="20px">MANAGEMENT</text>
    <text x="0" y="12" class="main-text center-title" font-size="20px">PROCESS CYCLE</text>

    <line x1="0" y1="0" x2="75.1" y2="280.1" stroke="#111111" stroke-width="3"/>
    <line x1="0" y1="0" x2="-181.3" y2="226.3" stroke="#111111" stroke-width="3"/>
    <line x1="0" y1="0" x2="-284.1" y2="-57.9" stroke="#111111" stroke-width="3"/>
    <line x1="0" y1="0" x2="-130.3" y2="-257.7" stroke="#111111" stroke-width="3"/>
    <line x1="0" y1="0" x2="130.3" y2="-257.7" stroke="#111111" stroke-width="3"/>
    <line x1="0" y1="0" x2="272.9" y2="-99.2" stroke="#111111" stroke-width="3"/>
    <line x1="0" y1="0" x2="241.0" y2="161.7" stroke="#111111" stroke-width="3"/>

    <text x="-50" y="155" class="main-text label-num">1</text>
    <text x="-50" y="210" class="main-text label-title">PLANNING</text>

    <text x="-165" y="115" class="main-text label-num" transform="rotate(35, -165, 115)">2</text>
    <text x="-195" y="155" class="main-text label-title" transform="rotate(35, -195, 155)">ORGANIZING</text>

    <text x="-200" y="-70" class="main-text label-num" transform="rotate(-30, -200, -70)">3</text>
    <text x="-165" y="-120" class="main-text variable-style" transform="rotate(-30, -165, -120)">?</text>

    <text x="-70" y="-170" class="main-text label-num" transform="rotate(-60, -70, -170)">4</text>
    <text x="-110" y="-215" class="main-text label-title" transform="rotate(-60, -110, -215)">DIRECTING</text>

    <text x="100" y="-165" class="main-text label-num" transform="rotate(45, 100, -165)">5</text>
    <text x="135" y="-210" class="main-text label-title" transform="rotate(45, 135, -210)">MOTIVATING</text>

    <text x="215" y="-45" class="main-text label-num" transform="rotate(15, 215, -45)">6</text>
    <text x="180" y="-90" class="main-text label-title" transform="rotate(15, 180, -90)">COORDINATION</text>

    <text x="160" y="105" class="main-text label-num">7</text>
    <text x="170" y="160" class="main-text variable-style">P</text>
  </g>
</svg>
