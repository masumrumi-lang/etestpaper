<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <style>
      .main-text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight: 700; fill: #111111; text-anchor: middle; dominant-baseline: middle; }
      .label-title { font-size: 24px; letter-spacing: 0.5px; }
      .variable-style { font-size: 46px; fill: #d32f2f; font-weight: bold; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="#ffffff"/>

  <g transform="translate(400, 400)">
    <circle r="320" fill="none" stroke="#111111" stroke-width="4"/>

    <line x1="0" y1="0" x2="15.2" y2="-319.6" stroke="#111111" stroke-width="3"/>
    <line x1="0" y1="0" x2="245.1" y2="-205.7" stroke="#111111" stroke-width="3"/>
    <line x1="0" y1="0" x2="307.7" y2="85.5" stroke="#111111" stroke-width="3"/>
    <line x1="0" y1="0" x2="31.8" y2="318.4" stroke="#111111" stroke-width="3"/>
    <line x1="0" y1="0" x2="-188.1" y2="258.9" stroke="#111111" stroke-width="3"/>
    <line x1="0" y1="0" x2="-317.4" y2="-40.5" stroke="#111111" stroke-width="3"/>
    <line x1="0" y1="0" x2="-210.8" y2="-240.7" stroke="#111111" stroke-width="3"/>

    <text x="110" y="-170" class="main-text label-title">PLANNING</text>

    <text x="200" y="-50" class="main-text label-title">ORGANIZING</text>

    <text x="160" y="110" class="main-text label-title">STAFFING</text>

    <text x="-75" y="200" class="main-text label-title">DIRECTING</text>

    <text x="-160" y="110" class="main-text variable-style">?</text>

    <text x="-200" y="-50" class="main-text label-title">COORDINATING</text>

    <text x="-95" y="-180" class="main-text label-title">CONTROLLING</text>
  </g>
</svg>
